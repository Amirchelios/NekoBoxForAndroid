<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(1200px 600px at 50% -200px, #2b6dff 0%, #0b1020 60%, #070b16 100%);
        color: #eef2ff;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .wrap {
        width: min(560px, 92vw);
        text-align: center;
      }
      h1 {
        font-weight: 600;
        font-size: 28px;
        margin: 0 0 18px;
        letter-spacing: 0.4px;
      }
      .bar {
        display: flex;
        gap: 10px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(120, 170, 255, 0.55);
        border-radius: 20px;
        padding: 10px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      }
      input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: #fff;
        font-size: 16px;
        padding: 8px 6px;
      }
      button {
        border: none;
        border-radius: 14px;
        padding: 8px 16px;
        background: #2b6dff;
        color: #fff;
        font-weight: 600;
      }
      button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Search</h1>
      <form class="bar" onsubmit="go(); return false;">
        <input id="q" placeholder="Search or enter address" autocomplete="off" />
        <button type="submit">Go</button>
      </form>
    </div>
    <script>
      function go() {
        var input = document.getElementById("q").value.trim();
        if (!input) return;
        var lower = input.toLowerCase();
        var url = input;
        if (lower.startsWith("http://") || lower.startsWith("https://")) {
          url = input;
        } else if (lower.indexOf("://") >= 0) {
          url = input;
        } else if (input.indexOf(" ") >= 0 || (input.indexOf(".") === -1 && input.indexOf(":") === -1 && input !== "localhost")) {
          url = "https://duckduckgo.com/?q=" + encodeURIComponent(input);
        } else {
          url = "https://" + input;
        }
        location.href = url;
      }
    </script>
  </body>
</html>
